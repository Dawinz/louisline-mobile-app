name: louisline_mobile
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  url_launcher: ^6.3.2
  webview_flutter: ^4.13.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
    image_path: assets/icons/app_logo.png
    background_color: "#ffffff"
    theme_color: "#29388D"
  windows:
    generate: true
    image_path: assets/icons/app_logo.png
    icon_size: 256
  image_path: assets/icons/app_logo.png
  min_sdk_android: 21
